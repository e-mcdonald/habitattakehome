services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-habitat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-habitat}
      POSTGRES_DB: ${POSTGRES_DB:-habitat}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 2s
      timeout: 5s
      retries: 20

  pipeline:
    build: .
    env_file:
      - .env
    environment:
      # Override DATABASE_URL to point at the compose postgres service by name.
      DATABASE_URL: "postgresql://${POSTGRES_USER:-habitat}:${POSTGRES_PASSWORD:-habitat}@postgres:5432/${POSTGRES_DB:-habitat}"
    volumes:
      # Persist landing/validated JSONL between one-shot invocations.
      - pipeline_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy

  test:
    build:
      context: .
      target: test
    env_file:
      - .env
    environment:
      # Dedicated DB (not the dev/demo one) so @pytest.mark.db tests never
      # collide with rows loaded by other pipeline runs.
      DATABASE_URL: "postgresql://${POSTGRES_USER:-habitat}:${POSTGRES_PASSWORD:-habitat}@postgres:5432/habitat_test"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  pipeline_data:
