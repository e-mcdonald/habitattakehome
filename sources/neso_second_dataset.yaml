# STUB — proof that adding a second source is config + a pydantic model, not a code change.
#
# This references a fictional second NESO CKAN dataset. To actually enable it,
# you would:
#   1. Point resource_id at a real dataset.
#   2. Add a matching pydantic model in habitat_pipeline.validate.models.
#   3. Add the corresponding staging table to sql/schema.sql (or accept the
#      raw-only case documented in the extractor).
#
# No changes to any runner would be needed. The core task's own brief flags
# extensibility ("this may not be the only dataset we ingest from NESO"), and
# this file exists to demonstrate that the runner is source-agnostic.
#
# Note: resource_id below is also a placeholder, so actually running this
# source (--stage extract or --all) fails at the extract stage with a real
# CKAN "resource not found" error before validation is ever reached — not
# with a clean pydantic refusal. The unimplemented model below is what would
# reject every row once a real resource_id is wired in; it isn't itself what
# blocks a run today.

name: neso_second_dataset
extractor: ckan_datastore_sql

extractor_config:
  base_url: https://api.neso.energy/api/3/action/datastore_search_sql
  resource_id: 00000000-0000-0000-0000-000000000000   # placeholder; not enabled
  page_size: 25000
  incremental_field: _id
  inter_page_sleep_seconds: 0.2
  request_timeout_seconds: 30

# Deliberately unimplemented (extra="forbid", no fields) — would reject every
# row once a real resource_id is in place, proving validation is a per-source
# contract rather than shared runner logic.
schema_model: habitat_pipeline.validate.models.NesoSecondDatasetPlaceholder
raw_table: raw.neso_second_dataset
staging_table: staging.neso_second_dataset

business_key: unit_result_id
on_reject_threshold: fail
